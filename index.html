<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Five Nights at Epstein's</title>
<style>
body{
  margin:0;
  padding:0;
  overflow:hidden;
  background:black;
  font-family:monospace;
  color:white;
}

/* ADDED: disable selecting and dragging */
*{
  user-select:none;
  -webkit-user-select:none;
  -ms-user-select:none;
  -moz-user-select:none;
  -webkit-user-drag:none;
}

/* ADDED: prevent image grabbing */
img{
  pointer-events:none;
}

/* ADDED: prevent drag highlight */
body, img{
  -webkit-touch-callout:none;
}

#mainMenu{
  position:fixed;
  top:0;
  left:0;
  width:100%;
  height:100%;
  display:flex;
  flex-direction:column;
  align-items:flex-start;
  justify-content:center;
  padding-left:50px;
}

/* BIGGER TITLE TEXT */
.menuText{
  font-size:90px;
  line-height:1em;
  margin:5px 0;
}

button{
  font-size:36px;
  color:white;
  background:none;
  border:none;
  cursor:pointer;
  text-align:left;
  margin-top:30px;
  font-family:monospace;
}

button:hover{ color:#00ff00; }

/* VERSION TEXT */
#version{
  position:fixed;
  bottom:10px;
  right:15px;
  font-size:18px;
  opacity:0.7;
}

#loadingScreen{
  position:fixed;
  top:0;
  left:0;
  width:100%;
  height:100%;
  background:black;
  display:none;
  align-items:center;
  justify-content:center;
}

#loadingScreen img{
  width:auto;
  height:90%;
  opacity:0;
  transition:opacity 2.5s;
  object-fit:cover;
}
</style>
</head>
<body>

<div id="mainMenu">
  <div class="menuText">Five</div>
  <div class="menuText">Nights</div>
  <div class="menuText">At</div>
  <div class="menuText">Epsteins</div>
  <button id="startBtn">START</button>
</div>

<div id="loadingScreen">
  <img id="hwLoad" src="assets/TEXTURES/hw_loading.png">
</div>

<div id="version">0.5.1</div>

<audio id="menuMusic" src="assets/SFX/fnae_menu.wav" loop></audio>
<audio id="clickSound" src="assets/SFX/mouse_click.wav"></audio>

<script>
const startBtn = document.getElementById("startBtn");
const mainMenu = document.getElementById("mainMenu");
const loadingScreen = document.getElementById("loadingScreen");
const hwLoad = document.getElementById("hwLoad");
const menuMusic = document.getElementById("menuMusic");
const clickSound = document.getElementById("clickSound");

// ADDED: block right click and drag
document.addEventListener("contextmenu", e => e.preventDefault());
document.addEventListener("dragstart", e => e.preventDefault());

// Unlock audio for Chrome
let audioUnlocked = false;
document.addEventListener("click", function unlockAudio() {
    if(!audioUnlocked){
        menuMusic.volume = 0.5;
        menuMusic.play().catch(()=>{});
        audioUnlocked = true;
        document.removeEventListener("click", unlockAudio);
    }
});

// Click sound for buttons
document.querySelectorAll("button").forEach(btn=>{
    btn.addEventListener("click", ()=>{
        clickSound.currentTime=0;
        clickSound.play();
    });
});

// Start button functionality
startBtn.addEventListener("click", ()=>{
    menuMusic.pause();
    menuMusic.currentTime = 0;
    mainMenu.style.display = "none";
    loadingScreen.style.display = "flex";
    hwLoad.style.opacity=1;
    setTimeout(()=>{ hwLoad.style.opacity=0; },2500);
    setTimeout(()=>{ window.location.href="fnae.html"; },5000);
});
</script>

</body>
</html>
