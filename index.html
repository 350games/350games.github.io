<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Five Nights at Epstein's</title>
<style>
body{
  margin:0;
  padding:0;
  overflow:hidden;
  background:black;
  font-family:monospace;
  color:white;
}

/* Disable selecting and dragging */
*{
  user-select:none;
  -webkit-user-select:none;
  -ms-user-select:none;
  -moz-user-select:none;
  -webkit-user-drag:none;
}

img{
  pointer-events:none;
}

body, img{
  -webkit-touch-callout:none;
}

#mainMenu{
  position:fixed;
  top:0;
  left:0;
  width:100%;
  height:100%;
  display:flex;
  flex-direction:column;
  align-items:flex-start;
  justify-content:center;
  padding-left:50px;
}

.menuText{
  font-size:90px;
  line-height:1em;
  margin:5px 0;
}

button{
  font-size:36px;
  color:white;
  background:none;
  border:none;
  cursor:pointer;
  text-align:left;
  margin-top:30px;
  font-family:monospace;
}

button:hover{ color:#00ff00; }

#version{
  position:fixed;
  bottom:10px;
  right:15px;
  font-size:18px;
  opacity:0.7;
}

#loadingScreen{
  position:fixed;
  top:0;
  left:0;
  width:100%;
  height:100%;
  background:black;
  display:none;
  align-items:center;
  justify-content:center;
}

#loadingScreen img{
  width:auto;
  height:90%;
  opacity:0;
  transition:opacity 2.5s;
  object-fit:cover;
}

/* Enemy */
#enemy{
  position:fixed;
  bottom:0;
  right:15%;
  width:25vw;
  height:auto;
  transition:transform 0.1s;
}

/* Static */
#staticOverlay{
  position:fixed;
  top:0;
  left:0;
  width:100%;
  height:100%;
  object-fit:cover;
  opacity:0.2;
  transition:opacity 0.05s;
}
</style>
</head>
<body>

<div id="mainMenu">
  <div class="menuText">Five</div>
  <div class="menuText">Nights</div>
  <div class="menuText">At</div>
  <div class="menuText">Epsteins</div>
  <button id="startBtn">START</button>
</div>

<div id="loadingScreen">
  <img id="hwLoad">
</div>

<div id="version">5.5</div>

<img id="enemy">
<img id="staticOverlay">

<audio id="menuMusic" loop></audio>
<audio id="clickSound"></audio>

<script>
const startBtn = document.getElementById("startBtn");
const mainMenu = document.getElementById("mainMenu");
const loadingScreen = document.getElementById("loadingScreen");
const hwLoad = document.getElementById("hwLoad");
const menuMusic = document.getElementById("menuMusic");
const clickSound = document.getElementById("clickSound");
const enemy = document.getElementById("enemy");
const staticOverlay = document.getElementById("staticOverlay");

/* Block right click */
document.addEventListener("contextmenu", e => e.preventDefault());
document.addEventListener("dragstart", e => e.preventDefault());

/* Asset finder */
function findAsset(fileName, element){
    const paths = [
        "assets/" + fileName,
        "assets/images/" + fileName,
        "assets/img/" + fileName,
        "assets/textures/" + fileName,
        "assets/TEXTURES/" + fileName,
        "assets/sprites/" + fileName,
        "assets/misc/" + fileName
    ];

    let i = 0;

    function tryNext(){
        if(i >= paths.length){
            console.warn(fileName + " not found");
            return;
        }

        const test = new Image();
        test.src = paths[i];

        test.onload = () => element.src = paths[i];
        test.onerror = () => { i++; tryNext(); };
    }

    tryNext();
}

/* Audio finder */
function findAudio(fileName, element){
    const paths = [
        "assets/" + fileName,
        "assets/audio/" + fileName,
        "assets/sfx/" + fileName,
        "assets/SFX/" + fileName
    ];

    let i = 0;

    function tryNext(){
        if(i >= paths.length){
            console.warn(fileName + " not found");
            return;
        }

        element.src = paths[i];
        element.load();

        element.onerror = () => { i++; tryNext(); };
    }

    tryNext();
}

/* Load assets */
findAsset("enemy.png", enemy);
findAsset("static.gif", staticOverlay);
findAsset("hw_loading.png", hwLoad);

findAudio("fnae_menu.wav", menuMusic);
findAudio("mouse_click.wav", clickSound);

/* Unlock audio */
let unlocked = false;
document.addEventListener("click", function(){
    if(!unlocked){
        menuMusic.volume = 0.5;
        menuMusic.play().catch(()=>{});
        unlocked = true;
    }
});

/* Click sound */
document.querySelectorAll("button").forEach(btn=>{
    btn.addEventListener("click", ()=>{
        clickSound.currentTime = 0;
        clickSound.play();
    });
});

/* Quick static flicker */
function flicker(){
    const delay = Math.random()*1000 + 200;

    setTimeout(()=>{
        if(staticOverlay.style.display !== "none"){
            staticOverlay.style.opacity = Math.random()*0.8 + 0.2; // higher opacity spikes

            setTimeout(()=>{
                staticOverlay.style.opacity = 0.2;
                flicker();
            }, Math.random()*100);
        }
    }, delay);
}

/* Quick enemy tilt */
function tilt(){
    const delay = Math.random()*1500 + 500;

    setTimeout(()=>{
        if(enemy.style.display !== "none"){
            const angle = Math.random()*20 - 10; // bigger tilt
            enemy.style.transform = `rotate(${angle}deg)`;

            setTimeout(()=>{
                enemy.style.transform = "rotate(0deg)";
                tilt();
            }, 150); // faster reset
        }
    }, delay);
}

flicker();
tilt();

/* Start button */
startBtn.addEventListener("click", ()=>{
    menuMusic.pause();
    menuMusic.currentTime = 0;

    enemy.style.display = "none";
    staticOverlay.style.display = "none";

    mainMenu.style.display = "none";
    loadingScreen.style.display = "flex";

    hwLoad.style.opacity = 1;

    setTimeout(()=>{ hwLoad.style.opacity = 0; }, 2500);
    setTimeout(()=>{ window.location.href="fnae.html"; }, 5000);
});
</script>

</body>
</html>
